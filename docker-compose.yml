
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_php
    working_dir: /app
    volumes:
      - ./:/app
      - /app/vendor
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000
    environment:
      - PUSHER_HOST=reverb
      - PUSHER_PORT=8080
      - PUSHER_SCHEME=http
      - PUSHER_APP_ID=${REVERB_APP_ID:-app-id}
      - PUSHER_APP_KEY=${REVERB_APP_KEY:-app-key}
      - PUSHER_APP_SECRET=${REVERB_APP_SECRET:-app-secret}
    depends_on:
      kafka:
        condition: service_healthy
      storage:
        condition: service_started
      reverb:
        condition: service_started
    networks:
      - app-network

  reverb:
    image: php:8.2-cli
    container_name: laravel_reverb
    working_dir: /app
    volumes:
      - ./:/app
    command: php artisan reverb:start
    environment:
      - APP_ENV=local
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      - redis
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - app-network

  storage:
    image: minio/minio
    container_name: minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minio124
      MINIO_ROOT_PASSWORD: minio1235
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ministorage_data:/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SERVER_ID: 1
    networks:
      - app-network


networks:
  app-network:
    driver: bridge
    
volumes:
  ministorage_data:
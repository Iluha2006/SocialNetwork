global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "laravel-app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["nginx:80"]
        labels:
          app: "social-network"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

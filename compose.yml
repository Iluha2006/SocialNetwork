services:

  storage:
    hostname: minio
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minio124
      MINIO_ROOT_PASSWORD: minio1235
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - ministorage_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  ministorage_data: